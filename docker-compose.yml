services:
  db:
    image: postgres:16
    container_name: budgetflow_db
    restart: always
    environment:
      POSTGRES_USER: budgetflow_user
      POSTGRES_PASSWORD: budgetflow_pass
      POSTGRES_DB: budgetflow_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: budgetflow_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://budgetflow_user:budgetflow_pass@db:5432/budgetflow_db
    depends_on:
      - db
    volumes:
      - .:/app

volumes:
  pgdata: